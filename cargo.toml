[package]
name = "monero-miner"
version = "0.1.0"
edition = "2021"

[dependencies]
num_cpus = "1.16"
ctrlc = "3.4"
randomx-rs = "0.2.0"   # bindings para RandomX
hex = "0.4"             # para conversão de bytes para hex

[[bin]]
name = "monero-miner-console"
path = "src/main_console.rs"

[profile.release]
strip = true
lto = true
codegen-units = 1
