[package]
name = "monero-miner"
version = "0.1.0"
edition = "2021"

[dependencies]
num_cpus = "1.16"
ctrlc = "3.4"
randomx-rs = "0.2.0"
hex = "0.4"
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
tokio = { version = "1", features = ["full"] }  # necessário para algumas compatibilidades

[[bin]]
name = "monero-miner"
path = "src/main.rs"
