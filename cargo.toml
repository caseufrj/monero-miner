[package]
name = "monero-miner"
version = "0.1.0"
edition = "2021"

[dependencies]
num_cpus = "1.16"
ctrlc = "3.4"
randomx-rs = "0.2.0"
hex = "0.4"
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
clap = { version = "4.0", features = ["derive"] }

[[bin]]
name = "monero-miner"
path = "src/main.rs"
