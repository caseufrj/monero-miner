name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          override: true

      - name: Build Rust wrapper
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Download XMRig
        shell: pwsh
        run: |
          $url = "https://github.com/xmrig/xmrig/releases/download/v6.22.2/xmrig-6.22.2-msvc-win64.zip"
          Invoke-WebRequest -Uri $url -OutFile xmrig.zip
          Expand-Archive -Path xmrig.zip -DestinationPath xmrig_temp
          Copy-Item -Path "xmrig_temp\xmrig-*\xmrig.exe" -Destination "xmrig.exe"
          Remove-Item -Recurse -Force xmrig_temp, xmrig.zip

      - name: Upload wrapper executable (no zip)
        uses: actions/upload-artifact@v4
        with:
          name: monero-miner-wrapper
          path: target/x86_64-pc-windows-msvc/release/monero-miner-wrapper.exe

      - name: Upload xmrig executable (optional)
        uses: actions/upload-artifact@v4
        with:
          name: xmrig
          path: xmrig.exe
